<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyVector Flughafen-Katalog</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1d23; color: #d0d8e8; }

        header {
            background: #111318;
            border-bottom: 2px solid #f5a623;
            padding: 20px 32px;
            display: flex; align-items: center; gap: 18px;
        }
        .logo {
            width: 44px; height: 44px; border-radius: 8px;
            background: #f5a623;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; flex-shrink: 0;
        }
        header h1 { font-size: 1.4rem; font-weight: 700; color: #fff; }
        header p  { font-size: 0.82rem; color: #888; margin-top: 3px; }

        .toolbar {
            background: #111318; border-bottom: 1px solid #2a2d35;
            padding: 12px 28px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        }

        #suche {
            flex: 1; min-width: 200px; max-width: 440px;
            padding: 9px 14px; font-size: 0.95rem;
            border: 1px solid #2e3240; border-radius: 6px; outline: none;
            background: #1e2130; color: #d0d8e8;
            transition: border-color 0.2s;
        }
        #suche:focus { border-color: #f5a623; }
        #suche::placeholder { color: #555; }

        .filter-gruppe { display: flex; gap: 6px; flex-wrap: wrap; }

        .filter-btn {
            padding: 5px 12px; font-size: 0.78rem; border-radius: 20px;
            border: 1px solid #2e3240; background: #1e2130; cursor: pointer;
            color: #888; transition: all 0.15s;
        }
        .filter-btn.aktiv { background: #f5a623; color: #111; border-color: #f5a623; font-weight: 600; }

        #zaehler { font-size: 0.82rem; color: #555; margin-left: auto; white-space: nowrap; }

        .container { max-width: 1000px; margin: 24px auto; padding: 0 20px; }

        #hinweis {
            text-align: center; padding: 60px 20px; color: #444; font-size: 1rem;
        }
        #hinweis span { font-size: 2.5rem; display: block; margin-bottom: 12px; }

        #laden { text-align: center; padding: 50px; color: #555; }
        .lade-balken {
            width: 200px; height: 3px; background: #2a2d35; border-radius: 2px;
            margin: 12px auto 0; overflow: hidden;
        }
        .lade-balken::after {
            content: '';
            display: block; width: 50%; height: 100%; background: #f5a623;
            animation: laden 1.2s infinite ease-in-out;
        }
        @keyframes laden { 0% { margin-left: -50%; } 100% { margin-left: 150%; } }

        .flughafen {
            background: #1e2130; border-radius: 10px; margin-bottom: 8px;
            border: 1px solid #2a2d35; overflow: hidden;
        }

        .fh-header {
            display: flex; align-items: center; gap: 12px;
            padding: 13px 18px; cursor: pointer; background: #1e2130;
            border: none; width: 100%; text-align: left;
            transition: background 0.15s;
        }
        .fh-header:hover { background: #252840; }

        .icao-badge {
            font-family: monospace; font-weight: 700; font-size: 0.95rem;
            background: #f5a623; color: #111;
            padding: 4px 10px; border-radius: 6px; flex-shrink: 0;
            min-width: 54px; text-align: center;
        }
        .iata-badge {
            font-family: monospace; font-size: 0.8rem;
            background: #2a2d35; color: #f5a623;
            padding: 3px 8px; border-radius: 5px; flex-shrink: 0;
        }

        .fh-info { flex: 1; min-width: 0; }
        .fh-name { font-weight: 600; font-size: 0.93rem; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fh-meta { font-size: 0.78rem; color: #666; margin-top: 2px; }

        .typ-badge {
            font-size: 0.72rem; padding: 2px 8px; border-radius: 12px;
            white-space: nowrap; flex-shrink: 0;
        }
        .typ-large_airport  { background: #2a3a1a; color: #7ec850; }
        .typ-medium_airport { background: #1a2a3a; color: #50a8ec; }
        .typ-small_airport  { background: #2a2a1a; color: #ecca50; }
        .typ-heliport       { background: #2a1a2a; color: #c850ec; }
        .typ-seaplane_base  { background: #1a2a2a; color: #50ecec; }
        .typ-balloonport    { background: #2a1a1a; color: #ec5050; }

        .fh-chevron { color: #444; font-size: 0.75rem; flex-shrink: 0; transition: transform 0.2s; }
        .fh-header.offen .fh-chevron { transform: rotate(90deg); }

        .fh-inhalt {
            display: none; border-top: 1px solid #2a2d35;
            padding: 16px 18px; background: #181b26;
        }
        .fh-inhalt.offen { display: block; }

        .detail-zeile { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; }
        .detail-item label { color: #555; display: block; font-size: 0.72rem; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
        .detail-item span  { font-weight: 600; color: #ccc; font-size: 0.85rem; }

        .ext-links { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }

        .sv-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 16px; background: #f5a623; color: #111;
            text-decoration: none; border-radius: 6px; font-size: 0.85rem; font-weight: 700;
            transition: background 0.15s;
        }
        .sv-btn:hover { background: #ffc04a; }

        .ext-link {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 7px 14px; background: #2a2d35; color: #aaa;
            text-decoration: none; border-radius: 6px; font-size: 0.82rem;
            transition: background 0.15s;
        }
        .ext-link:hover { background: #333647; color: #ddd; }

        .sektion-titel {
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.06em; color: #f5a623; margin: 14px 0 8px;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        th { text-align: left; padding: 6px 10px; background: #1a1d26; color: #666; font-weight: 600; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; }
        td { padding: 6px 10px; border-bottom: 1px solid #22252f; color: #bbb; }
        tr:last-child td { border-bottom: none; }

        #mehr-btn {
            display: block; width: 100%; padding: 10px; text-align: center;
            background: #1e2130; border: 1px solid #2a2d35; border-radius: 8px;
            color: #666; cursor: pointer; font-size: 0.88rem; margin-top: 4px;
            transition: background 0.15s;
        }
        #mehr-btn:hover { background: #252840; color: #aaa; }
    </style>
</head>
<body>

<header>
    <div class="logo">✈</div>
    <div>
        <h1>SkyVector Flughafen-Katalog</h1>
        <p>72.000+ Flughäfen weltweit mit Runways, Frequenzen & Nav-Aids — direkt auf SkyVector öffnen</p>
    </div>
</header>

<div class="toolbar">
    <input type="text" id="suche" placeholder="ICAO, IATA, Name, Stadt, Land suchen…" autocomplete="off">
    <div class="filter-gruppe" id="filter">
        <button class="filter-btn aktiv" data-typ="">Alle</button>
        <button class="filter-btn" data-typ="large_airport">Groß</button>
        <button class="filter-btn" data-typ="medium_airport">Regional</button>
        <button class="filter-btn" data-typ="small_airport">Klein</button>
        <button class="filter-btn" data-typ="heliport">Heliport</button>
        <button class="filter-btn" data-typ="seaplane_base">Wasserflugzeug</button>
    </div>
    <span id="zaehler"></span>
</div>

<div class="container">
    <div id="liste">
        <div id="laden">
            Daten werden geladen…
            <div class="lade-balken"></div>
        </div>
    </div>
</div>

<script>
const JSON_URL = 'https://raw.githubusercontent.com/jscepik-source/dfs-katalog/main/ourairports_export.json';
let katalog = {};
let aktiverTyp = '';
let sucheTimeout = null;
const SEITE = 50;
let aktuelleEintraege = [];
let angezeigtBis = 0;

const TYP_LABEL = {
    large_airport:  'Großflughafen',
    medium_airport: 'Regionalflughafen',
    small_airport:  'Kleinflughafen',
    heliport:       'Heliport',
    seaplane_base:  'Wasserflugzeugbasis',
    balloonport:    'Ballonplatz'
};

fetch(JSON_URL)
    .then(r => r.json())
    .then(data => {
        katalog = data;
        document.getElementById('laden').style.display = 'none';
        zeigeHinweis();
    })
    .catch(() => {
        document.getElementById('laden').innerHTML = 'Fehler beim Laden der Daten.';
    });

function zeigeHinweis() {
    document.getElementById('liste').innerHTML =
        '<div id="hinweis"><span>✈</span>ICAO, IATA, Name, Stadt oder Land eingeben</div>';
    document.getElementById('zaehler').textContent =
        `${Object.keys(katalog).length.toLocaleString()} Flughäfen geladen`;
}

function suche() {
    const q = document.getElementById('suche').value.trim().toLowerCase();
    if (!q && !aktiverTyp) { zeigeHinweis(); return; }

    aktuelleEintraege = Object.entries(katalog).filter(([icao, ap]) => {
        const typOk = !aktiverTyp || ap.type === aktiverTyp;
        if (!typOk) return false;
        if (!q) return true;
        return icao.toLowerCase().includes(q)
            || (ap.iata    || '').toLowerCase().includes(q)
            || (ap.name    || '').toLowerCase().includes(q)
            || (ap.city    || '').toLowerCase().includes(q)
            || (ap.country || '').toLowerCase().includes(q);
    });

    angezeigtBis = 0;
    const liste = document.getElementById('liste');
    liste.innerHTML = '';
    document.getElementById('zaehler').textContent =
        `${aktuelleEintraege.length.toLocaleString()} Ergebnisse`;

    if (aktuelleEintraege.length === 0) {
        liste.innerHTML = '<p style="color:#444;padding:20px">Keine Ergebnisse.</p>';
        return;
    }
    ladeNaechste(liste);
}

function ladeNaechste(liste) {
    const batch = aktuelleEintraege.slice(angezeigtBis, angezeigtBis + SEITE);
    angezeigtBis += batch.length;
    batch.forEach(([icao, ap]) => liste.appendChild(baueKarte(icao, ap)));

    const altBtn = document.getElementById('mehr-btn');
    if (altBtn) altBtn.remove();

    if (angezeigtBis < aktuelleEintraege.length) {
        const btn = document.createElement('button');
        btn.id = 'mehr-btn';
        btn.textContent = `Weitere ${Math.min(SEITE, aktuelleEintraege.length - angezeigtBis).toLocaleString()} von ${(aktuelleEintraege.length - angezeigtBis).toLocaleString()} laden`;
        btn.onclick = () => ladeNaechste(liste);
        liste.appendChild(btn);
    }
}

function baueKarte(icao, ap) {
    const div = document.createElement('div');
    div.className = 'flughafen';

    const typLabel = TYP_LABEL[ap.type] || ap.type || '';
    const typClass = 'typ-' + (ap.type || '');
    const elev = ap.elev !== undefined ? ap.elev + ' ft' : '–';
    const coords = (ap.lat !== undefined && ap.lon !== undefined) ? `${ap.lat}, ${ap.lon}` : '–';
    const svUrl = `https://skyvector.com/airport/${icao}`;
    const mapsUrl = (ap.lat && ap.lon) ? `https://maps.google.com/?q=${ap.lat},${ap.lon}` : null;

    const rwyHTML = ap.runways && ap.runways.length > 0
        ? `<p class="sektion-titel">Runways</p>
           <table>
             <tr><th>Kennung</th><th>Länge (ft)</th><th>Kurs</th><th>Belag</th></tr>
             ${ap.runways.map(r => `<tr>
               <td>${r.id || '–'}</td>
               <td>${r.length !== undefined ? r.length.toLocaleString() : '–'}</td>
               <td>${r.heading !== undefined ? r.heading + '°' : '–'}</td>
               <td>${r.surface || '–'}</td>
             </tr>`).join('')}
           </table>` : '';

    const frqHTML = ap.freqs && ap.freqs.length > 0
        ? `<p class="sektion-titel">Frequenzen</p>
           <table>
             <tr><th>Typ</th><th>Frequenz (MHz)</th><th>Bezeichnung</th></tr>
             ${ap.freqs.map(f => `<tr>
               <td>${f.type || '–'}</td>
               <td>${f.freq || '–'}</td>
               <td>${f.desc || '–'}</td>
             </tr>`).join('')}
           </table>` : '';

    const navHTML = ap.navaids && ap.navaids.length > 0
        ? `<p class="sektion-titel">Nav-Aids (VOR / NDB)</p>
           <table>
             <tr><th>Kennung</th><th>Name</th><th>Typ</th><th>Frequenz (kHz)</th></tr>
             ${ap.navaids.map(n => `<tr>
               <td>${n.ident || '–'}</td>
               <td>${n.name  || '–'}</td>
               <td>${n.type  || '–'}</td>
               <td>${n.freq  || '–'}</td>
             </tr>`).join('')}
           </table>` : '';

    div.innerHTML = `
        <button class="fh-header" onclick="toggle(this)">
            <span class="icao-badge">${icao}</span>
            ${ap.iata ? `<span class="iata-badge">${ap.iata}</span>` : ''}
            <div class="fh-info">
                <div class="fh-name">${ap.name || '–'}</div>
                <div class="fh-meta">${ap.city || ''}${ap.city && ap.country ? ' · ' : ''}${ap.country || ''}</div>
            </div>
            <span class="typ-badge ${typClass}">${typLabel}</span>
            <span class="fh-chevron">▶</span>
        </button>
        <div class="fh-inhalt">
            <div class="detail-zeile">
                <div class="detail-item"><label>ICAO</label><span>${icao}</span></div>
                ${ap.iata ? `<div class="detail-item"><label>IATA</label><span>${ap.iata}</span></div>` : ''}
                <div class="detail-item"><label>Land</label><span>${ap.country || '–'}</span></div>
                <div class="detail-item"><label>Stadt</label><span>${ap.city || '–'}</span></div>
                <div class="detail-item"><label>Höhe</label><span>${elev}</span></div>
                <div class="detail-item"><label>Koordinaten</label><span>${coords}</span></div>
            </div>
            <div class="ext-links">
                <a class="sv-btn" href="${svUrl}" target="_blank">✈ Auf SkyVector öffnen</a>
                ${mapsUrl ? `<a class="ext-link" href="${mapsUrl}" target="_blank">🗺 Google Maps</a>` : ''}
                ${ap.web  ? `<a class="ext-link" href="${ap.web}"  target="_blank">🌐 Website</a>` : ''}
                ${ap.wiki ? `<a class="ext-link" href="${ap.wiki}" target="_blank">📖 Wikipedia</a>` : ''}
            </div>
            ${rwyHTML}
            ${frqHTML}
            ${navHTML}
        </div>`;
    return div;
}

function toggle(btn) {
    btn.classList.toggle('offen');
    btn.nextElementSibling.classList.toggle('offen');
}

document.getElementById('suche').addEventListener('input', () => {
    clearTimeout(sucheTimeout);
    sucheTimeout = setTimeout(suche, 200);
});

document.getElementById('filter').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('aktiv'));
    btn.classList.add('aktiv');
    aktiverTyp = btn.dataset.typ;
    suche();
});
</script>
</body>
</html>
