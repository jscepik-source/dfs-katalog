name: DFS Katalog aktualisieren

on:
  schedule:
    - cron: '0 3 * * 4/4'  # Alle 28 Tage donnerstags um 3 Uhr
  workflow_dispatch:         # Auch manuell startbar

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install selenium requests beautifulsoup4

      - name: Chrome installieren
        uses: browser-actions/setup-chrome@v1

      - name: Flughafen-Bot ausführen
        run: python dfs_bot.py

      - name: NOTAM-Bot ausführen
        run: python notam_bot.py

      - name: JSONs committen und pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dfs_katalog_export.json notam_info.json
          git diff --staged --quiet || git commit -m "Katalog und NOTAM automatisch aktualisiert (AIRAC)"
          git push
